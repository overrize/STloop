name: End-to-End Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install cmake ninja -y

    - name: Install ARM toolchain (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        wget -q https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
        tar -xf arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
        sudo mv arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi /opt/arm-gnu-toolchain
        echo "/opt/arm-gnu-toolchain/bin" >> $GITHUB_PATH

    - name: Install ARM toolchain (Windows)
      if: runner.os == 'Windows'
      run: |
        $url = "https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-mingw-w64-i686-arm-none-eabi.zip"
        Invoke-WebRequest -Uri $url -OutFile arm-toolchain.zip
        Expand-Archive -Path arm-toolchain.zip -DestinationPath C:\arm-toolchain
        echo "C:\arm-toolchain\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    - name: Install STLoop
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Verify toolchain
      run: |
        arm-none-eabi-gcc --version
        cmake --version
        ninja --version

    - name: Run E2E Test
      run: |
        python tests/e2e_test.py --skip-simulation
      timeout-minutes: 10

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
        path: /tmp/stloop_e2e_*/
        retention-days: 7

  e2e-test-with-sim:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[test-sim]') || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Install ARM toolchain
      run: |
        wget -q https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
        tar -xf arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
        sudo mv arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi /opt/arm-gnu-toolchain
        echo "/opt/arm-gnu-toolchain/bin" >> $GITHUB_PATH

    - name: Install Renode
      run: |
        wget -q https://github.com/renode/renode/releases/download/v1.14.0/renode_1.14.0_amd64.deb
        sudo dpkg -i renode_1.14.0_amd64.deb || sudo apt-get install -f -y

    - name: Install STLoop
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run E2E Test with Simulation
      run: |
        python tests/e2e_test.py
      timeout-minutes: 15
      env:
        RENODE_BIN: /usr/bin/renode

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts-with-sim
        path: /tmp/stloop_e2e_*/
        retention-days: 7
