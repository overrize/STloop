name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install project and audit tool
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pip-audit — check for known vulnerabilities
        run: pip-audit --strict --desc

  ruff-security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff security-focused checks
        run: ruff check stloop/ --select S --output-format=github
        continue-on-error: true
