# Zephyr-compatible Project Configuration
# This project uses cmsis_minimal as the HAL layer

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# GPIO
CONFIG_GPIO=y

# Clock  
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=100000000

# Kernel
CONFIG_MAIN_THREAD_PRIORITY=5
CONFIG_MAIN_STACK_SIZE=1024

# Debugging
CONFIG_DEBUG=y

# Floating Point
CONFIG_FPU=y
CONFIG_FLOAT=y
