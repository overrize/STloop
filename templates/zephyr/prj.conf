# Zephyr Project Configuration
# STM32F411RE Nucleo Board

# Console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# GPIO
CONFIG_GPIO=y

# Clock
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=100000000

# Kernel
CONFIG_MAIN_THREAD_PRIORITY=5
CONFIG_MAIN_STACK_SIZE=1024

# Debugging
CONFIG_DEBUG=y
CONFIG_ASSERT=y

# Power Management
CONFIG_PM=n

# Floating Point
CONFIG_FPU=y
CONFIG_FLOAT=y
