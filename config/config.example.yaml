# STLoop 配置文件
# 复制为 config.yaml 并修改

# 目标芯片
target:
  chip: STM32F411RE
  board: Nucleo-F411RE

# STM32Cube 软件包路径（需包含 Drivers/CMSIS, Drivers/STM32F4xx_HAL_Driver）
# 留空则使用 scripts/download_cube.py 自动下载
cube_path: ""
# 示例: "C:/STM32Cube/Repository/STM32Cube_FW_F4_V1.27.1"

# 工具链
toolchain:
  cmake: cmake
  make: make
  # Windows 可用: ninja
  generator: "Unix Makefiles"

# 大模型（用于代码生成，建议用 .env 配置 api_key）
# Kimi K2 参考: https://platform.moonshot.cn/docs/guide/agent-support
llm:
  model: gpt-4o-mini
  # Kimi K2 示例:
  # base_url: https://api.moonshot.cn/v1
  # model: kimi-k2-0905-preview   # 256K 上下文
  # model: kimi-k2-turbo-preview  # 高速版

# pyOCD
pyocd:
  frequency: 4000000
  # 多探针时指定: "E6616407E3646B29"
